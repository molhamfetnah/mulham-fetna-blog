# -- Markup --
# These settings are required for the theme to function.

[markup]
  [markup.mermaid]
    pango = false
    securityLevel = "restricted" # valid options: none, lax, strict, restricted (default)
    [markup.mermaid.gotmpl]
      sequenceLeftHandText = false
      
[goldmark]
  [goldmark.parser]
    wrapStandAloneImageWithinParagraph = false

    [goldmark.parser.attribute]
      block = true

  [goldmark.renderer]
    unsafe = true

  [goldmark.extensions]
    [goldmark.extensions.passthrough]
      enable = true
      [goldmark.extensions.passthrough.delimiters]
        block = [['\[', '\]'], ['$$', '$$']]
        inline = [['\(', '\)']]

[highlight]
  noClasses = false

[tableOfContents]
  startLevel = 1
  endLevel = 4
